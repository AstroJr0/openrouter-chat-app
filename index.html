<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomBoom 💥 💥 AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="brand">Nexus</span>
            <div class="model-badge">
                <span id="current-model-display">gpt-4o</span>
            </div>
        </div>
        
        <div class="nav-right">
            <button id="btn-api-key" class="nav-btn">API Key</button>
            <button id="btn-add-model" class="nav-btn">Add Model</button>
        </div>
    </nav>

    <main id="chat-window">
        <div id="messages-container">
            <div class="message system">
                Welcome. Set your OpenRouter API key to begin.
            </div>
        </div>
    </main>

    <footer class="input-section">
        <div class="input-wrapper">
            <textarea 
                id="user-input" 
                placeholder="Ask anything..." 
                rows="1"
            ></textarea>
            
            <button id="send-btn" aria-label="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </footer>

    <div id="toast-overlay" class="hidden">
        <div class="toast-card">
            <h3 id="toast-title">Input Required</h3>
            <input type="text" id="toast-input" placeholder="Type here...">
            <div class="toast-actions">
                <button id="toast-cancel">Cancel</button>
                <button id="toast-confirm">Save</button>
            </div>
        </div>
    </div>

    <script src="app.ts" type="module" lang="ts"></script>
</body>
</html>
