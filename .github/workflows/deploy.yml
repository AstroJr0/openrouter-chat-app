name: Deploy BoomBoom AI

on:
  push:
    branches: ["main"]
  # This enables the manual "Run workflow" button in GitHub UI
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        # This will now work because you'll have a package.json in your repo
        run: bun install

      - name: Build Frontend
        # Bundles your TypeScript into a single JS file for the browser
        run: bun build ./app.ts --outdir ./dist

      - name: Copy Static Files
        run: |
          cp index.html dist/
          cp style.css dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
